<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="menubar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e5e5"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>

  <!-- 菜单栏 -->
  <rect x="0" y="0" width="800" height="36" fill="url(#menubar)" rx="16"/>
  <rect x="0" y="16" width="800" height="20" fill="url(#menubar)"/>

  <!-- 左侧菜单 -->
  <text x="24" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">🍎</text>
  <text x="44" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#555">DeepSeek Balance</text>

  <!-- 右侧菜单 -->
  <text x="500" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#555">🔍</text>
  <text x="528" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#555">🔊</text>
  <text x="560" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#555">Wi‑Fi</text>
  <text x="604" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#555">🔋</text>

  <!-- DeepSeek 余额 -->
  <rect x="640" y="8" width="100" height="20" rx="4" fill="#10a37f" opacity="0.15"/>
  <text x="648" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#10a37f">💰 ¥53.00</text>

  <text x="752" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#555">03:15</text>

  <!-- 分隔线 -->
  <line x1="0" y1="36" x2="800" y2="36" stroke="#ccc" stroke-width="0.5"/>

  <!-- 下拉菜单 -->
  <rect x="630" y="44" width="158" height="200" rx="8" fill="white" stroke="#ddd" stroke-width="0.5" filter="url(#shadow)"/>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 菜单项 -->
  <text x="642" y="68" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">余额: ¥53.00</text>

  <text x="642" y="96" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">点击复制余额</text>
  <text x="748" y="96" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#999">⌘C</text>

  <line x1="642" y1="108" x2="778" y2="108" stroke="#eee" stroke-width="0.5"/>

  <text x="642" y="126" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">✅ 开机自启</text>

  <line x1="642" y1="138" x2="778" y2="138" stroke="#eee" stroke-width="0.5"/>

  <text x="642" y="156" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">修改 API Key</text>

  <text x="642" y="180" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">立即刷新</text>
  <text x="748" y="180" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#999">⌘R</text>

  <line x1="642" y1="192" x2="778" y2="192" stroke="#eee" stroke-width="0.5"/>

  <text x="642" y="210" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#333">退出</text>
  <text x="748" y="210" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#999">⌘Q</text>

  <!-- 底部说明 -->
  <text x="400" y="310" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="#333">DeepSeek Balance</text>
  <text x="400" y="335" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#666">Mac 菜单栏实时显示你的 DeepSeek API 余额</text>
</svg>
